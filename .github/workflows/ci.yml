name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        workspace:
          - apps/graphql-api
          - apps/txn-loaders
          - apps/tag-loaders
          - packages/auth
          - packages/client
          - packages/common
          - packages/db
          - packages/logger
          - packages/parser
          - packages/nlp-tagger
          - packages/services

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run ESLint
        run: pnpm exec eslint . --ext .ts

      - name: Check Prettier formatting
        run: pnpm exec prettier --check .
      # - name: Run tests
      #   run: pnpm test
